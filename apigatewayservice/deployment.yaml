apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigatewayservice-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apigatewayservice-app
  template:
    metadata:
      labels:
        app: apigatewayservice-app
    spec:
      containers:
        - name: apigatewayservice-app
          image: apigatewayservice-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: apigatewayservice-app-configmap
            - secretRef:
                name: apigatewayservice-app-secret
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 10
            periodSeconds: 60

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 3
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            failureThreshold: 3
            periodSeconds: 10
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 768Mi
              cpu: 1000m
