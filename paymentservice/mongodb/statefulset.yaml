apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: paymentservice-mongo
spec:
  serviceName: paymentservice-mongo-headless
  replicas: 1
  selector:
    matchLabels:
      app: paymentservice-mongo
  template:
    metadata:
      labels:
        app: paymentservice-mongo
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports:
            - containerPort: 27017
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          env:
            - name: MONGO_INITDB_DATABASE
              value: paymentservicedb
            - name: MONGO_INITDB_ROOT_USERNAME
              value: user
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: password
          volumeMounts:
            - name: paymentservice-storage
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: paymentservice-storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 500Mi
